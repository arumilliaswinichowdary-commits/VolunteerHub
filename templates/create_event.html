<form action="/create_event" method="POST">

<input type="text"
name="event_name"
placeholder="Event Name"
class="form-control mb-3">

<input type="date"
name="event_date"
class="form-control mb-3">

<input type="text"
name="location"
placeholder="Location"
class="form-control mb-3">

<textarea
name="description"
class="form-control mb-3">
</textarea>

<button class="btn btn-success">
Create Event
</button>

</form>
