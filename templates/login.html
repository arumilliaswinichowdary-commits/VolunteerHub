<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VolunteerHub Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=1600');
    background-size:cover;
    background-position:center;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.login-box{
    position:relative;
    width:420px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:25px;
    padding:40px;
    color:white;
    z-index:1;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

.form-control{
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
    height:50px;
}

.form-control::placeholder{
    color:#eee;
}

.form-control:focus{
    background:rgba(255,255,255,0.25);
    color:white;
    box-shadow:none;
}

.btn-login{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#06b6d4;
    color:white;
    font-size:18px;
    transition:0.3s;
}

.btn-login:hover{
    background:#0891b2;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.icon{
    margin-right:8px;
}

</style>

</head>
<body>

<div class="overlay"></div>

<div class="login-box">

<h1>
<i class="fa-solid fa-hands-helping"></i>
VolunteerHub
</h1>

<form action="/login_user" method="POST">

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Email Address"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button type="submit" class="btn-login">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="register-link">

Don't have an account?

<a href="/register">
Register Here
</a>

</div>

</div>

</body>
</html>
