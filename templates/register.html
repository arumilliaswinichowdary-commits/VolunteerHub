<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volunteer Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=1600');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

.register-box{
    position:relative;
    width:900px;
    max-width:95%;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:25px;
    padding:40px;
    color:white;
    z-index:1;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-weight:bold;
}

.form-control,
.form-select{
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
}

.form-control::placeholder{
    color:#eee;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,0.25);
    color:white;
    box-shadow:none;
}

.btn-register{
    background:#06b6d4;
    border:none;
    padding:12px;
    font-size:18px;
    border-radius:30px;
    width:100%;
    color:white;
    transition:0.3s;
}

.btn-register:hover{
    background:#0891b2;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

.icon{
    margin-right:8px;
}

</style>

</head>
<body>

<div class="overlay"></div>

<div class="register-box">

<div class="title">
    <h1><i class="fa-solid fa-hands-helping"></i> VolunteerHub</h1>
    <p>Join our volunteer community today</p>
</div>

<form action="/register_user" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<input type="text"
class="form-control"
name="fullname"
placeholder="Full Name"
required>
</div>

<div class="col-md-6 mb-3">
<input type="email"
class="form-control"
name="email"
placeholder="Email Address"
required>
</div>

<div class="col-md-6 mb-3">
<input type="text"
class="form-control"
name="phone"
placeholder="Phone Number"
required>
</div>

<div class="col-md-6 mb-3">
<input type="number"
class="form-control"
name="age"
placeholder="Age"
required>
</div>

<div class="col-md-6 mb-3">
<select class="form-select" name="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-6 mb-3">
<input type="text"
class="form-control"
name="skills"
placeholder="Skills (Teaching, Coding, etc.)"
required>
</div>

<div class="col-12 mb-3">
<input type="password"
class="form-control"
name="password"
placeholder="Create Password"
required>
</div>

<div class="col-12 mb-3">
<textarea
class="form-control"
name="address"
rows="3"
placeholder="Address"></textarea>
</div>

<div class="col-12">

<button type="submit" class="btn-register">

<i class="fa-solid fa-user-plus"></i>

Register Now

</button>

</div>

</div>

</form>

<div class="login-link">

Already have an account?

<a href="/login">Login Here</a>

</div>

</div>

</body>
</html>
